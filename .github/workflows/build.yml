name: Build DragonSkins Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        minecraft: [
          "1.16.2", "1.17.1", "1.18.1", "1.18.2",
          "1.19", "1.19.2", "1.19.3", "1.19.4",
          "1.20", "1.20.1", "1.20.2", "1.20.4", "1.20.6",
          "1.21.1", "1.21.3", "1.21.4"
        ]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build for Minecraft ${{ matrix.minecraft }}
        run: ./gradlew build --no-daemon
        env:
          MINECRAFT_VERSION: ${{ matrix.minecraft }}

      - name: Rename JAR file
        run: |
          mkdir -p release
          cp build/libs/dragonskins-*.jar release/dragonskins-${{ matrix.minecraft }}.jar

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dragonskins-${{ matrix.minecraft }}
          path: release/*.jar
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name "*.jar" -exec cp {} release/ \;
          ls -la release/

      - name: Delete existing release
        continue-on-error: true
        run: |
          gh release delete latest --yes --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automated build of DragonSkins mod for all supported Minecraft versions.
            
            Download the JAR file for your Minecraft version and place it in your mods folder.
          files: release/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
